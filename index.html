<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Электронный дневник</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --yale-blue: #0D3B66;
            --lemon-chiffon: #FAF0CA;
            --white: #ffffff;
            --text-dark: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--lemon-chiffon);
            color: var(--text-dark);
        }

        header {
            background-color: var(--yale-blue);
            color: var(--lemon-chiffon);
            padding: 40px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
        }

        header p {
            margin: 5px 0 0;
            opacity: 0.8;
            font-size: 1.1rem;
        }

        .plant-icon {
            position: absolute;
            width: 80px;
            height: 80px;
            opacity: 0.2;
            fill: var(--lemon-chiffon);
        }
        .top-left { top: 10px; left: 10px; }
        .bottom-right { bottom: 10px; right: 10px; transform: rotate(45deg); }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .add-subject-box {
            background: rgba(255, 255, 255, 0.4);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(13, 59, 102, 0.2);
        }

        input {
            padding: 10px;
            font-size: 16px;
            border: 2px solid var(--yale-blue);
            border-radius: 6px;
            outline: none;
            width: 60%;
            max-width: 300px;
            background: #fff;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: var(--yale-blue);
            color: var(--lemon-chiffon);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.8;
            transform: scale(1.02);
        }

        .subject-card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-left: 5px solid var(--yale-blue);
        }

        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .subject-title {
            font-family: 'Oswald', sans-serif;
            font-size: 1.8rem;
            margin: 0;
            color: var(--yale-blue);
        }

        .delete-subject {
            background: transparent;
            color: #ff6b6b;
            font-size: 24px;
            padding: 0 10px;
        }
        .delete-subject:hover { background: #ffebeb; transform: scale(1.1); }

        .grade-input-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .grade-input {
            width: 60px;
            text-align: center;
            margin-right: 10px;
            border: 1px solid #ccc;
        }

        .add-grade-btn {
            padding: 5px 15px;
            font-size: 14px;
            background: #ddd;
            color: #333;
        }
        .add-grade-btn:hover { background: #ccc; transform: scale(1); }

        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            input { width: 100%; margin-bottom: 10px; }
            .add-subject-box { display: flex; flex-direction: column; align-items: center;}
            .subject-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <svg class="plant-icon top-left" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
        <svg class="plant-icon bottom-right" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
        
        <h1>ЭЛЕКТРОННЫЙ ДНЕВНИК</h1>
        <p>Твой личный помощник</p>
    </header>

    <div class="container">
        <div class="add-subject-box">
            <input type="text" id="subjectInput" placeholder="Введите название предмета...">
            <button onclick="addSubject()">Добавить предмет</button>
        </div>

        <div id="subjectsList"></div>
    </div>

    <script>
        let subjects = JSON.parse(localStorage.getItem('diaryData')) || [];

        function renderSubjects() {
            const list = document.getElementById('subjectsList');
            list.innerHTML = ''; 

            subjects.forEach((subject, index) => {
                const card = document.createElement('div');
                card.className = 'subject-card';

                const header = document.createElement('div');
                header.className = 'subject-header';
                header.innerHTML = `
                    <h2 class="subject-title">${subject.name}</h2>
                    <button class="delete-subject" onclick="deleteSubject(${index})">✕</button>
                `;
                card.appendChild(header);

                subject.grades.forEach((grade, gIndex) => {
                    const gradeGroup = document.createElement('div');
                    gradeGroup.className = 'grade-input-group';
                    gradeGroup.innerHTML = `
                        <input type="number" class="grade-input" value="${grade}" onchange="updateGrade(${index}, ${gIndex}, this.value)">
                        <button class="add-grade-btn" onclick="deleteGrade(${index}, ${gIndex})">Удалить</button>
                    `;
                    card.appendChild(gradeGroup);
                });

                const addGradeBtn = document.createElement('div');
                addGradeBtn.className = 'grade-input-group';
                addGradeBtn.innerHTML = `<button class="add-grade-btn" onclick="addGrade(${index})" style="width:100%; background:#0D3B66; color:#FAF0CA;">+ Добавить оценку</button>`;
                card.appendChild(addGradeBtn);

                list.appendChild(card);
            });
        }

        function addSubject() {
            const input = document.getElementById('subjectInput');
            const name = input.value.trim();
            if (name) {
                subjects.push({ name: name, grades: [] });
                input.value = '';
                saveAndRender();
            } else {
                alert('Пожалуйста, введите название предмета!');
            }
        }

        function deleteSubject(index) {
            if (confirm('Удалить предмет?')) {
                subjects.splice(index, 1);
                saveAndRender();
            }
        }

        function addGrade(subjectIndex) {
            subjects[subjectIndex].grades.push('');
            saveAndRender();
        }

        function updateGrade(subjectIndex, gradeIndex, value) {
            subjects[subjectIndex].grades[gradeIndex] = value;
            localStorage.setItem('diaryData', JSON.stringify(subjects));
        }

        function deleteGrade(subjectIndex, gradeIndex) {
            subjects[subjectIndex].grades.splice(gradeIndex, 1);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('diaryData', JSON.stringify(subjects));
            renderSubjects();
        }

        renderSubjects();
    </script>
</body>
</html>
